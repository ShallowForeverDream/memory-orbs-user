name: Temporary exact TSD DCS-930L crawler

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Download DCS-930L v1.08 from D-Link TSD
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          python3 -m pip install --quiet requests lxml
          python3 - <<'PY' 2>&1 | tee out/tsd-exact.log
          import hashlib, io, os, re, zipfile
          from urllib.parse import urljoin
          import requests
          from lxml import html

          BASE='https://tsd.dlink.com.tw/'
          TARGET='dcs930l_v108_b4.bin'
          s=requests.Session(); s.verify=False
          requests.packages.urllib3.disable_warnings()
          found=False

          def log(*x): print(*x,flush=True)
          def save(data,src,name=''):
            global found
            if len(data)<100000: return False
            try:
              if zipfile.is_zipfile(io.BytesIO(data)):
                z=zipfile.ZipFile(io.BytesIO(data)); names=z.namelist()
                log('ZIP',src,len(data),hashlib.md5(data).hexdigest(),names)
                hit=next((n for n in names if os.path.basename(n).lower()==TARGET),None)
                if hit:
                  open('out/DCS-930L_FIRMWARE_1.08_B4.ZIP','wb').write(data)
                  open('out/'+TARGET,'wb').write(z.read(hit)); found=True; return True
              low=(src+' '+name).lower()
              if len(data)>2_000_000 and not data.lstrip().lower().startswith((b'<html',b'<!doctype')) and (TARGET in low or ('dcs930l' in low and any(v in low for v in ('108','1.08','b4')))):
                open('out/'+TARGET,'wb').write(data); found=True
                log('RAW',src,len(data),hashlib.md5(data).hexdigest(),name); return True
            except Exception as e: log('SAVE ERROR',e)
            return False

          root=s.get(BASE,verify=False,timeout=30)
          log('ROOT',root.status_code,len(root.content),root.url,root.cookies.get_dict())
          payload={'Enter':'OK','ModelCategory':'DCS','ModelSno':'930L','ModelCategory_home':'DCS','ModelSno_home':'930L'}
          referers=[BASE+'ddwn',BASE,BASE+'downloads2008.asp']
          docs=[]
          for ref in referers:
            r=s.post(BASE+'ddetail',data=payload,headers={'Referer':ref,'Upgrade-Insecure-Requests':'1'},verify=False,timeout=45)
            fn='out/detail-'+str(len(docs))+'.html'; open(fn,'wb').write(r.content)
            log('DETAIL',ref,r.status_code,len(r.content),r.url)
            docs.append((r.url,r.text,ref))

          records=[]
          for src,text,ref in docs:
            tree=html.fromstring(text)
            rows=tree.xpath(".//tr[@id='rsq']")
            log('ROWS',ref,len(rows))
            for row in rows:
              tds=row.xpath('./td')
              cells=[' '.join(x.strip() for x in td.xpath('.//text()') if x.strip()) for td in tds]
              oc=row.get('onclick') or ''
              if cells: log('ROW',cells[:4],oc)
              m=re.search(r"dwn\('([^']+)'\s*,\s*'([^']+)'\)",oc)
              desc=' '.join(cells)
              if m and ('firmware' in desc.lower() or re.search(r'\bFW\s*v?\s*1\.08|v108|1\.08\s*B?4',desc,re.I)):
                records.append((m.group(1),m.group(2),desc,src))
          # deduplicate opaque document tokens
          seen=set(); records=[x for x in records if not (x[:2] in seen or seen.add(x[:2]))]
          log('FIRMWARE RECORDS',records)

          # If current page only exposes manuals, send plausible document-type filters.
          if not records:
            filters=['Firmware','Firmware/Driver','FIRMWARE','firmware','1','2','3']
            keys=['DocType','DocumentType','Type','Category','docType','selType','DownloadType']
            for key in keys:
              for val in filters:
                p=dict(payload); p[key]=val
                r=s.post(BASE+'ddetail',data=p,headers={'Referer':BASE+'ddwn','Upgrade-Insecure-Requests':'1'},verify=False,timeout=30)
                text=r.text
                if 'Firmware:' in text or re.search(r'>Firmware\s*<',text,re.I):
                  open(f'out/filter-{key}-{re.sub(r"[^A-Za-z0-9]","_",val)}.html','wb').write(r.content)
                  tree=html.fromstring(text)
                  for row in tree.xpath(".//tr[@id='rsq']"):
                    cells=[' '.join(x.strip() for x in td.xpath('.//text()') if x.strip()) for td in row.xpath('./td')]
                    oc=row.get('onclick') or ''; desc=' '.join(cells)
                    m=re.search(r"dwn\('([^']+)'\s*,\s*'([^']+)'\)",oc)
                    if m and 'firmware' in desc.lower(): records.append((m.group(1),m.group(2),desc,r.url))
                  log('FILTER HIT',key,val,len(records))

          for token,source,desc,ref in records:
            if found: break
            form={'Enter':'OK','ModelCategory':'0','ModelCategory_':'DCS','ModelSno':'0','ModelSno_':'930L','ModelVer':'','Model_Sno':'','docuSno':token,'docuSource':source}
            for endpoint in ['downloads2008detailgo.asp','ddgo','downloads2008detailgo']:
              if found: break
              u=urljoin(BASE,endpoint)
              r=s.post(u,data=form,headers={'Referer':BASE+'downloads2008detail.asp','Upgrade-Insecure-Requests':'1'},verify=False,timeout=45)
              open('out/go-'+token+'-'+endpoint.replace('/','_')+'.html','wb').write(r.content)
              log('GO',token,endpoint,r.status_code,len(r.content),r.url,desc)
              tree=html.fromstring(r.text)
              names=tree.xpath(".//*[@class='fn9']/text()")
              hrefs=tree.xpath(".//*[@class='fn9']/@href")
              log('FILES',names,hrefs)
              for name,href in zip(names,hrefs):
                m=re.search(r"dnn\('([^']+)'\)",href)
                if not m: continue
                sno=m.group(1)
                for ep in [f'asp/get_file.asp?sno={sno}',f'get_file.asp?sno={sno}']:
                  q=s.get(urljoin(BASE,ep),headers={'Referer':r.url,'Upgrade-Insecure-Requests':'1'},verify=False,timeout=120,allow_redirects=True)
                  cd=q.headers.get('Content-Disposition','')
                  log('FILE',name,sno,q.status_code,len(q.content),q.url,cd,q.headers.get('Content-Type'))
                  if save(q.content,q.url,cd+' '+name): break

          if found:
            lines=[]
            for p in ['out/DCS-930L_FIRMWARE_1.08_B4.ZIP','out/'+TARGET]:
              if os.path.exists(p):
                d=open(p,'rb').read(); lines += [f'MD5 {hashlib.md5(d).hexdigest()}  {os.path.basename(p)}',f'SHA256 {hashlib.sha256(d).hexdigest()}  {os.path.basename(p)}']
            open('out/checksums.txt','w').write('\n'.join(lines)+'\n')
            log('SUCCESS',lines)
          else:
            log('NOT FOUND')
          PY
      - name: Upload exact TSD output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcs930l-tsd-exact-output
          path: out
          retention-days: 1
