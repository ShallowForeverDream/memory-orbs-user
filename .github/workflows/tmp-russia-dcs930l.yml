name: Temporary DCS-930L regional archive fetch

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Crawl D-Link regional firmware archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          python3 - <<'PY'
          import hashlib, io, os, re, sys, urllib.parse, zipfile
          from html.parser import HTMLParser
          import urllib.request

          ROOTS = [
            'https://ftp.dlink.ru/pub/Multimedia/DCS-930L/Firmware/',
            'http://ftp.dlink.ru/pub/Multimedia/DCS-930L/Firmware/',
          ]
          TARGET = 'dcs930l_v108_b4.bin'
          EXPECTED_ZIP_MD5 = '31f11d8a7f938ddd78aec361063245a4'
          UA = 'Mozilla/5.0'
          seen_pages=set(); seen_files=set(); logs=[]

          class Links(HTMLParser):
            def __init__(self): super().__init__(); self.links=[]
            def handle_starttag(self, tag, attrs):
              if tag.lower()=='a':
                d=dict(attrs)
                if d.get('href'): self.links.append(d['href'])

          def log(s): print(s, flush=True); logs.append(s)
          def get(url, timeout=20):
            req=urllib.request.Request(url,headers={'User-Agent':UA})
            with urllib.request.urlopen(req,timeout=timeout) as r:
              return r.geturl(), r.headers, r.read()

          def save_candidate(data, url):
            low=url.lower()
            if data.startswith(b'PK') and zipfile.is_zipfile(io.BytesIO(data)):
              z=zipfile.ZipFile(io.BytesIO(data)); names=z.namelist()
              log(f'ZIP {url} size={len(data)} md5={hashlib.md5(data).hexdigest()} names={names}')
              for n in names:
                if os.path.basename(n).lower()==TARGET:
                  bindata=z.read(n)
                  open('out/DCS-930L_FIRMWARE_1.08_B4.ZIP','wb').write(data)
                  open('out/'+TARGET,'wb').write(bindata)
                  open('out/checksums.txt','w').write(
                    f'MD5 {hashlib.md5(data).hexdigest()}  DCS-930L_FIRMWARE_1.08_B4.ZIP\n'
                    f'SHA256 {hashlib.sha256(data).hexdigest()}  DCS-930L_FIRMWARE_1.08_B4.ZIP\n'
                    f'MD5 {hashlib.md5(bindata).hexdigest()}  {TARGET}\n'
                    f'SHA256 {hashlib.sha256(bindata).hexdigest()}  {TARGET}\n')
                  return True
            if os.path.basename(urllib.parse.urlparse(url).path).lower()==TARGET or (TARGET.encode()[:12] in data[:200] and len(data)>100000):
              open('out/'+TARGET,'wb').write(data)
              open('out/checksums.txt','w').write(
                f'MD5 {hashlib.md5(data).hexdigest()}  {TARGET}\nSHA256 {hashlib.sha256(data).hexdigest()}  {TARGET}\n')
              return True
            return False

          queue=[(r,0) for r in ROOTS]
          found=False
          while queue and not found:
            url,depth=queue.pop(0)
            if url in seen_pages or depth>4: continue
            seen_pages.add(url)
            try:
              final,headers,data=get(url)
              ctype=headers.get('Content-Type','')
              log(f'GET {url} -> {final} {len(data)} {ctype}')
            except Exception as e:
              log(f'ERR {url}: {e}'); continue
            if save_candidate(data, final): found=True; break
            text=data.decode('utf-8','replace')
            open(f'out/listing-{len(seen_pages)}.html','w',encoding='utf-8').write(text)
            p=Links(); p.feed(text)
            for href in p.links:
              child=urllib.parse.urljoin(final,href)
              if child in seen_files: continue
              low=urllib.parse.unquote(child).lower()
              if any(x in low for x in ['?c=','icons/','../']): continue
              if child.endswith('/'):
                if any(x in low for x in ['firmware','1.08','108','rev_a','reva','a1']) or depth<1:
                  queue.append((child,depth+1))
              elif any(low.endswith(ext) for ext in ['.zip','.bin','.rar','.7z']) and any(x in low for x in ['1.08','108','b4','930l']):
                seen_files.add(child)
                try:
                  ffinal,fh,fd=get(child,40)
                  log(f'FILE {child} -> {ffinal} {len(fd)}')
                  if save_candidate(fd,ffinal): found=True; break
                except Exception as e: log(f'FILE ERR {child}: {e}')

          open('out/crawl.log','w').write('\n'.join(logs)+'\n')
          if not found:
            log('target not found')
          PY
      - name: Upload regional archive result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcs930l-regional-archive
          path: out
          retention-days: 1
