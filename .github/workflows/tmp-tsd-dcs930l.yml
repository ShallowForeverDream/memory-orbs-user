name: Temporary D-Link TSD DCS-930L recovery

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Navigate D-Link Technical Support downloads
        shell: bash
        run: |
          set +e
          mkdir -p out
          python3 -m pip install --quiet playwright
          cat > /tmp/tsd.py <<'PY'
          import asyncio, hashlib, io, json, os, re, zipfile
          from playwright.async_api import async_playwright

          TARGET='dcs930l_v108_b4.bin'; OUT='out/DCS-930L_FIRMWARE_1.08_B4.ZIP'; BIN='out/'+TARGET
          logs=[]; found=False
          def log(*a):
            s=' '.join(str(x) for x in a); print(s,flush=True); logs.append(s)
          def validate(data,src):
            global found
            try:
              if len(data)<100000: return False
              if zipfile.is_zipfile(io.BytesIO(data)):
                z=zipfile.ZipFile(io.BytesIO(data)); names=z.namelist(); log('ZIP',src,len(data),hashlib.md5(data).hexdigest(),names)
                n=next((x for x in names if os.path.basename(x).lower()==TARGET),None)
                if n:
                  open(OUT,'wb').write(data); open(BIN,'wb').write(z.read(n)); found=True; return True
              low=src.lower()
              if len(data)>2_000_000 and any(k in low for k in ['dcs930l_v108_b4.bin','dcs-930l_a1_fw_v1.08','dcs-930l_firmware_1.08']):
                open(BIN,'wb').write(data); found=True; return True
            except Exception as e: log('validate',e)
            return False

          async def main():
            global found
            async with async_playwright() as p:
              browser=await p.chromium.launch(executable_path='/usr/bin/google-chrome',headless=True,args=['--no-sandbox','--disable-dev-shm-usage'])
              ctx=await browser.new_context(accept_downloads=True,ignore_https_errors=True,viewport={'width':1440,'height':1200})
              page=await ctx.new_page()
              async def onresp(resp):
                try:
                  u=resp.url; low=u.lower(); ct=(resp.headers.get('content-type') or '').lower(); cd=(resp.headers.get('content-disposition') or '').lower()
                  if any(k in low for k in ['dcs-930l','dcs930l','firmware','.zip','.bin','download']) or 'attachment' in cd:
                    log('RESP',resp.status,u,ct,cd)
                    if resp.status==200:
                      try:
                        d=await resp.body(); validate(d,u)
                      except Exception as e: log('body',e)
                except Exception: pass
              page.on('response',onresp)
              try: await page.goto('https://tsd.dlink.com.tw/',wait_until='networkidle',timeout=90000)
              except Exception as e: log('goto',e)
              await page.wait_for_timeout(5000)
              html=await page.content(); open('out/root.html','w').write(html); await page.screenshot(path='out/root.png',full_page=True)
              log('ROOT',page.url,await page.title(),len(html))
              sels=page.locator('select'); count=await sels.count(); log('SELECTS',count)
              for i in range(count):
                try:
                  opts=await sels.nth(i).locator('option').all_text_contents(); vals=await sels.nth(i).locator('option').evaluate_all('(els)=>els.map(e=>e.value)')
                  log('SELECT',i,list(zip(vals,opts))[:300])
                except Exception as e: log('select inspect',i,e)
              # Select DCS in any selector that exposes it.
              for i in range(await page.locator('select').count()):
                sel=page.locator('select').nth(i)
                try:
                  opts=await sel.locator('option').all_text_contents()
                  idx=next((j for j,t in enumerate(opts) if t.strip().upper()=='DCS'),None)
                  if idx is not None:
                    val=await sel.locator('option').nth(idx).get_attribute('value'); log('CHOOSE DCS',i,val)
                    await sel.select_option(value=val); await page.wait_for_timeout(4000)
                except Exception as e: log('choose DCS err',e)
              # Select DCS-930L after dependent dropdown is populated.
              for i in range(await page.locator('select').count()):
                sel=page.locator('select').nth(i)
                try:
                  opts=await sel.locator('option').all_text_contents()
                  idx=next((j for j,t in enumerate(opts) if 'DCS-930L' in t.upper()),None)
                  if idx is not None:
                    val=await sel.locator('option').nth(idx).get_attribute('value'); log('CHOOSE MODEL',i,val,opts[idx])
                    await sel.select_option(value=val); await page.wait_for_timeout(3000)
                except Exception as e: log('choose model err',e)
              # Click submit/search/image controls.
              for selector in ['input[type=submit]','button','input[type=image]','a:has-text("Go")','a:has-text("Search")']:
                try:
                  loc=page.locator(selector)
                  for i in range(min(await loc.count(),10)):
                    el=loc.nth(i)
                    if await el.is_visible():
                      txt=(await el.get_attribute('value')) or (await el.inner_text())
                      log('CLICK CONTROL',selector,i,txt)
                      try: await el.click(timeout=5000); await page.wait_for_timeout(7000)
                      except Exception as e: log('click control',e)
                except Exception: pass
              html=await page.content(); open('out/result.html','w').write(html); await page.screenshot(path='out/result.png',full_page=True)
              log('RESULT PAGE',page.url,await page.title(),len(html))
              links=await page.eval_on_selector_all('a','els=>els.map(e=>({t:(e.innerText||e.textContent||"").trim(),h:e.href,o:e.getAttribute("onclick")}))')
              open('out/links.json','w').write(json.dumps(links,ensure_ascii=False,indent=2))
              # Follow every DCS-930L / firmware / 1.08 link and try download.
              candidates=[]
              for x in links:
                st=json.dumps(x,ensure_ascii=False); low=st.lower()
                if any(k in low for k in ['dcs-930l','dcs930l','firmware','1.08','108','download','.zip','.bin']):
                  log('LINK',st[:1500]);
                  if x.get('h'): candidates.append(x['h'])
              for u in candidates[:100]:
                if found: break
                try:
                  async with page.expect_download(timeout=12000) as di:
                    await page.goto(u,wait_until='domcontentloaded',timeout=30000)
                  dl=await di.value; path=await dl.path(); data=open(path,'rb').read(); log('DOWNLOAD',u,dl.suggested_filename,len(data),dl.url); validate(data,dl.url)
                except Exception:
                  try:
                    r=await ctx.request.get(u,timeout=30000,fail_on_status_code=False); data=await r.body(); log('REQUEST',u,r.status,len(data)); validate(data,u)
                  except Exception as e: log('candidate err',u,e)
              await browser.close()
            if os.path.exists(OUT) or os.path.exists(BIN):
              arr=[]
              for f in [OUT,BIN]:
                if os.path.exists(f):
                  d=open(f,'rb').read(); arr += [f'MD5 {hashlib.md5(d).hexdigest()}  {os.path.basename(f)}',f'SHA256 {hashlib.sha256(d).hexdigest()}  {os.path.basename(f)}']
              open('out/checksums.txt','w').write('\n'.join(arr)+'\n')
            open('out/tsd.log','w').write('\n'.join(logs)+'\n')
          asyncio.run(main())
          PY
          python3 /tmp/tsd.py
      - name: Upload TSD recovery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcs930l-tsd-output
          path: out
          retention-days: 1
